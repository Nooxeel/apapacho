name: Deploy to Vercel

# SEC-F-001: el deploy solo se dispara cuando el workflow "CI" completó exitosamente en main.
# workflow_run es la única forma de encadenar workflows entre archivos distintos en GitHub Actions;
# `needs:` solo funciona entre jobs del mismo archivo.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Solo despliega si CI pasó completo Y el evento vino de la rama main.
    # github.event.workflow_run.head_branch filtra re-runs de PRs que no sean main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
